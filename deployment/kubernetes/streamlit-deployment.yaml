apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: streamlit
  name: streamlit
spec:
  replicas: 2
  selector:
    matchLabels:
      app: streamlit
  strategy: {}
  template:
    metadata:
      labels:
        app: streamlit
    spec:
      containers:
      - image: benjaminhosseini/streamlit:dev
        imagePullPolicy: Always
        name: streamlit
        ports:
          - containerPort: 8501
        resources: {}
        env:
          - name: API_URL
            value: "http://fastapi:8000"
status: {}
