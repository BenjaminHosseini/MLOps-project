apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: house-price-api-monitor
  labels:
    release: prom  # Match the label of your Prometheus instance as per helm release
spec:
  selector:
    matchLabels:
      app: fastapi
  namespaceSelector:
    matchNames:
      - default  # or your namespace
  endpoints:
    - port: metrics     # port 9100 — dedicated Prometheus HTTP server started with start_http_server(9100)
                        # This runs in its own thread, completely separate from Uvicorn.
                        # It responds in ~23ms even under full load, vs port 8000 /metrics which
                        # blocks behind queued /predict requests and can take 56+ seconds to respond.
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s